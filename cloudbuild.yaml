substitutions:
  _REGION: us-central1
  _AR_REPO: cloud-run-source-deploy
  _JOB_NAME: web-scraper-job

  # Cloud SQL
  _SQL_INSTANCE: sisen-articles
  _DB_NAME: sisen_articles_db
  _DB_USER: admin
  # ⚠️ Must match the name of the Secret Manager secret holding the DB password.
  _DB_PASS_SECRET: sisen-db-password

steps:
  # 1. Build the image, tagged with both ${SHORT_SHA} and 'latest'.
  - name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/sisen-crawler:${SHORT_SHA}
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/sisen-crawler:latest
      - .

  # 2. Push both tags to Artifact Registry.
  - name: "gcr.io/cloud-builders/docker"
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/sisen-crawler

  # 3. Deploy the Cloud Run Job — `deploy` is idempotent: creates the Job
  #    on the first run and updates it on every subsequent run.
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - jobs
      - deploy
      - ${_JOB_NAME}
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/sisen-crawler:${SHORT_SHA}
      - --region=${_REGION}
      - --set-env-vars=INSTANCE_CONNECTION_NAME=${PROJECT_ID}:${_REGION}:${_SQL_INSTANCE},DB_NAME=${_DB_NAME},DB_USER=${_DB_USER},DB_IP_TYPE=PUBLIC
      - --set-secrets=DB_PASS=${_DB_PASS_SECRET}:latest
      - --memory=2Gi
      - --cpu=2
      - --task-timeout=1800
      - --max-retries=1

# Forces logs to Cloud Logging instead of a bucket.
options:
  logging: CLOUD_LOGGING_ONLY

# Declared images so Cloud Build records them as build artifacts.
images:
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/sisen-crawler:${SHORT_SHA}
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/sisen-crawler:latest
